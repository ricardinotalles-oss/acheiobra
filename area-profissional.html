<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AcheiObra — Área do Profissional</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --laranja:#E8521A;--laranja-cl:#FF6B35;
  --bg:#0F0F0F;--bg2:#1A1A1A;--bg3:#242424;
  --branco:#FAFAF8;--muted:rgba(255,255,255,0.5);--dim:rgba(255,255,255,0.2);
  --border:rgba(255,255,255,0.08);--syne:'Syne',sans-serif;--dm:'DM Sans',sans-serif;
  --verde:#1D9E75;--amarelo:#EF9F27;
}
body{background:var(--bg);color:var(--branco);font-family:var(--dm);min-height:100vh;}

/* NAV */
nav{background:rgba(15,15,15,0.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 5%;position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none;}
.nav-icon{width:32px;height:32px;background:var(--laranja);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.nav-icon svg{width:18px;height:18px;}
.nav-nome{font-family:var(--syne);font-size:20px;font-weight:800;color:var(--branco);letter-spacing:-0.4px;}
.nav-nome span{color:var(--laranja);}
.nav-dir{display:flex;align-items:center;gap:12px;}
.nav-user{font-size:13px;color:var(--muted);}
.btn-sair{font-size:12px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer;font-family:var(--dm);}
.btn-sair:hover{color:var(--branco);}

/* BANNER PRAZO */
.banner-prazo{display:none;background:rgba(239,159,39,0.1);border-bottom:1px solid rgba(239,159,39,0.2);padding:10px 5%;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.banner-prazo.visible{display:flex;}
.banner-prazo-txt{font-size:13px;color:var(--amarelo);}
.btn-mei{font-size:12px;font-weight:700;color:var(--amarelo);background:rgba(239,159,39,0.15);border:1px solid rgba(239,159,39,0.3);padding:6px 14px;border-radius:8px;text-decoration:none;white-space:nowrap;}

/* TABS */
.page{max-width:800px;margin:0 auto;padding:28px 20px 80px;}
.tabs-nav{display:flex;background:var(--bg2);border-radius:12px;padding:4px;margin-bottom:20px;border:1px solid var(--border);}
.tab-btn{flex:1;font-family:var(--syne);font-size:13px;font-weight:700;padding:10px;border-radius:9px;cursor:pointer;color:var(--muted);transition:all .15s;text-align:center;border:none;background:none;}
.tab-btn.active{background:var(--laranja);color:#fff;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;}
.stat-val{font-family:var(--syne);font-size:22px;font-weight:800;}
.stat-val.laranja{color:var(--laranja);}
.stat-label{font-size:12px;color:var(--muted);margin-top:3px;}

/* LOADING / VAZIO */
.loading{text-align:center;padding:60px 20px;color:var(--muted);}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--laranja);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg);}}
.vazio{text-align:center;padding:50px 20px;}
.vazio-ico{font-size:40px;margin-bottom:10px;}
.vazio-titulo{font-family:var(--syne);font-size:17px;font-weight:700;margin-bottom:6px;}
.vazio-sub{font-size:13px;color:var(--muted);line-height:1.6;}

/* CARD DE SERVIÇO DISPONÍVEL */
.srv-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:12px;transition:border-color .15s;}
.srv-card:hover{border-color:rgba(232,82,26,0.25);}
.srv-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px;}
.srv-tipo{display:flex;align-items:center;gap:10px;}
.srv-emoji{font-size:26px;}
.srv-titulo{font-family:var(--syne);font-size:15px;font-weight:700;margin-bottom:3px;}
.srv-meta{font-size:12px;color:var(--muted);}
.urg-badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.urg-urgente{background:rgba(226,75,74,0.15);color:#F09595;}
.urg-normal{background:rgba(232,82,26,0.12);color:var(--laranja-cl);}
.urg-sem_pressa{background:rgba(255,255,255,0.06);color:var(--muted);}
.detalhes-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.detalhe-pill{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--bg3);color:var(--muted);border:1px solid var(--border);}
.fotos-wrap{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.foto-thumb{width:60px;height:60px;border-radius:8px;object-fit:cover;background:var(--bg3);}
.foto-placeholder{width:60px;height:60px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;}

/* PROPOSTA JÁ ENVIADA */
.ja-proposta{background:rgba(29,158,117,0.08);border:1px solid rgba(29,158,117,0.2);border-radius:10px;padding:10px 14px;font-size:13px;color:#5DCAA5;margin-bottom:8px;}

/* BOTÕES DE AÇÃO */
.acoes-wrap{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.btn-proposta{background:rgba(232,82,26,0.1);color:var(--laranja-cl);font-family:var(--syne);font-size:13px;font-weight:700;padding:9px 16px;border-radius:8px;border:1px solid rgba(232,82,26,0.2);cursor:pointer;transition:all .15s;}
.btn-proposta:hover{background:var(--laranja);color:#fff;}
.btn-chat-toggle{background:none;color:var(--muted);font-size:12px;padding:8px 14px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-family:var(--dm);}
.btn-chat-toggle:hover{color:var(--branco);}

/* FORM PROPOSTA */
.form-proposta{background:var(--bg3);border-radius:12px;padding:16px;margin-top:10px;display:none;}
.form-proposta.open{display:block;}
.form-titulo{font-size:13px;font-weight:600;color:var(--branco);margin-bottom:12px;}
.campo-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.campo-p{margin-bottom:10px;}
.campo-p label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;letter-spacing:0.04em;text-transform:uppercase;}
.campo-p input,.campo-p textarea{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--branco);font-family:var(--dm);outline:none;transition:border-color .15s;}
.campo-p input:focus,.campo-p textarea:focus{border-color:rgba(232,82,26,0.4);}
.campo-p textarea{resize:vertical;min-height:60px;}
.form-btns{display:flex;gap:8px;margin-top:4px;}
.btn-enviar{flex:1;background:var(--laranja);color:#fff;font-family:var(--syne);font-size:13px;font-weight:700;padding:11px;border-radius:8px;border:none;cursor:pointer;}
.btn-enviar:hover{background:var(--laranja-cl);}
.btn-cancelar-form{background:transparent;color:var(--muted);font-size:13px;padding:11px 14px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-family:var(--dm);}

/* CHAT */
.chat-box{background:var(--bg3);border-radius:12px;padding:14px;margin-top:8px;display:none;}
.chat-box.open{display:block;}
.chat-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:10px;}
.chat-msgs{max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;margin-bottom:10px;min-height:40px;}
.msg{padding:8px 12px;border-radius:10px;font-size:13px;line-height:1.5;max-width:85%;}
.msg-pro{background:rgba(232,82,26,0.12);border:1px solid rgba(232,82,26,0.2);align-self:flex-end;border-bottom-right-radius:3px;}
.msg-cli{background:var(--bg2);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:3px;}
.msg-nome{font-size:10px;color:var(--muted);margin-bottom:2px;}
.msg-hora{font-size:10px;color:var(--muted);text-align:right;margin-top:2px;}
.chat-input-row{display:flex;gap:6px;}
.chat-input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--branco);font-family:var(--dm);outline:none;resize:none;}
.chat-input:focus{border-color:rgba(232,82,26,0.4);}
.btn-send{background:var(--laranja);color:#fff;border:none;border-radius:8px;padding:0 14px;cursor:pointer;font-size:16px;}

/* MEUS SERVIÇOS */
.secao-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin:16px 0 10px;}
.meu-srv{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:10px;}
.meu-srv-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.meu-srv-titulo{font-family:var(--syne);font-size:14px;font-weight:700;margin-bottom:3px;}
.meu-srv-meta{font-size:12px;color:var(--muted);}
.badge-and{background:rgba(239,159,39,0.15);color:var(--amarelo);font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;}
.badge-conc{background:rgba(29,158,117,0.15);color:#5DCAA5;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;}
.valor-liq{font-family:var(--syne);font-size:18px;font-weight:800;color:var(--laranja);margin-bottom:2px;}
.valor-sub{font-size:11px;color:var(--muted);}
.pgto-tag{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;margin-top:6px;display:inline-block;}
.pgto-liberado{background:rgba(29,158,117,0.12);color:#5DCAA5;}
.pgto-retido{background:rgba(239,159,39,0.12);color:var(--amarelo);}
.nota-aval{font-size:12px;color:#F5A623;margin-top:4px;}
.comentario-aval{font-size:12px;color:var(--muted);font-style:italic;margin-top:4px;}
.btn-concluir{background:var(--verde);color:#fff;font-family:var(--syne);font-size:13px;font-weight:700;padding:9px 16px;border-radius:8px;border:none;cursor:pointer;margin-top:12px;}
.total-recebido{background:rgba(29,158,117,0.08);border:1px solid rgba(29,158,117,0.2);border-radius:12px;padding:14px 18px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.total-val{font-family:var(--syne);font-size:20px;font-weight:800;color:#5DCAA5;}
.total-label{font-size:12px;color:#5DCAA5;opacity:0.8;}

@media(max-width:480px){
  .stats{grid-template-columns:1fr 1fr;}
  .campo-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">
    <div class="nav-icon">
      <svg viewBox="0 0 44 44" fill="none">
        <path d="M8 20L22 8L36 20V38H28V28H16V38H8V20Z" fill="white" opacity="0.95"/>
        <circle cx="32" cy="14" r="7" fill="white"/>
        <path d="M29 14L31.5 16.5L35.5 11" stroke="#E8521A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="nav-nome">Achei<span>Obra</span></div>
  </a>
  <div class="nav-dir">
    <span class="nav-user" id="nav-nome">...</span>
    <button class="btn-sair" onclick="sair()">Sair</button>
  </div>
</nav>

<!-- BANNER PRAZO FORMALIZAÇÃO -->
<div class="banner-prazo" id="banner-prazo">
  <span class="banner-prazo-txt" id="banner-txt"></span>
  <a href="https://gov.br/mei" target="_blank" class="btn-mei">Abrir MEI grátis →</a>
</div>

<div class="page">

  <!-- TABS -->
  <div class="tabs-nav">
    <button class="tab-btn active" id="tab-btn-disponiveis" onclick="trocarTab('disponiveis')">Serviços disponíveis</button>
    <button class="tab-btn" id="tab-btn-meus" onclick="trocarTab('meus')">Meus serviços</button>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat"><div class="stat-val laranja" id="stat-propostas">0</div><div class="stat-label">Propostas enviadas</div></div>
    <div class="stat"><div class="stat-val" id="stat-andamento">0</div><div class="stat-label">Em andamento</div></div>
    <div class="stat"><div class="stat-val" id="stat-ganhos">R$ 0</div><div class="stat-label">Total recebido</div></div>
  </div>

  <!-- CONTEÚDO TABS -->
  <div id="tab-disponiveis">
    <div class="loading"><div class="spinner"></div>Buscando serviços...</div>
  </div>

  <div id="tab-meus" style="display:none;">
    <div class="loading"><div class="spinner"></div>Carregando...</div>
  </div>

</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const SUPABASE_URL = 'https://tsjtsxbnrxsowhqrkmjz.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzanRzeGJucnhzb3docXJrbWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjI0OTcsImV4cCI6MjA5MTgzODQ5N30.2jhI37qyVF1qjy61RSRGTtZlHedekb8VMZzMdOJxVnc'
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

const TIPO_LABEL = {
  pedra_calcada:'Pedra / calçada', eletrica:'Elétrica', hidraulica:'Hidráulica',
  pintura:'Pintura', alvenaria:'Alvenaria', gesseiro:'Gesseiro',
  azulejista:'Azulejista', carpintaria:'Carpintaria', serralheria:'Serralheria',
  casa_nova:'Construção de casa nova', outro:'Outro serviço'
}
const TIPO_EMOJI = {
  pedra_calcada:'🪨', eletrica:'⚡', hidraulica:'🔧', pintura:'🖌️',
  alvenaria:'🧱', gesseiro:'🪟', azulejista:'🪨', carpintaria:'🪚',
  serralheria:'🔩', casa_nova:'🏠', outro:'🏗️'
}
const URG_LABEL = { urgente:'Urgente', normal:'Normal', sem_pressa:'Sem pressa' }

let user = null
let prof = null
let profissionalId = null

// ── AUTH ─────────────────────────────────────────────────────
const { data: { session } } = await supabase.auth.getSession()
if (!session) { window.location.href = '/login'; }
user = session.user
document.getElementById('nav-nome').textContent = user.user_metadata?.nome || user.email

// ── BUSCA PROFISSIONAL ────────────────────────────────────────
const { data: profData } = await supabase
  .from('profissionais')
  .select('*')
  .eq('email', user.email)
  .maybeSingle()

if (!profData) {
  window.location.href = '/cadastro-profissional'
}

prof = profData
profissionalId = prof.id

// ── BANNER PRAZO ──────────────────────────────────────────────
if (prof.tipo_cadastro === 'autonomo' && prof.prazo_formalizacao) {
  const dias = Math.ceil((new Date(prof.prazo_formalizacao) - new Date()) / 86400000)
  if (dias > 0 && dias <= 90) {
    document.getElementById('banner-prazo').classList.add('visible')
    document.getElementById('banner-txt').textContent =
      dias <= 30
        ? `⚠️ Faltam ${dias} dias para regularizar seu MEI — após o prazo sua conta será suspensa.`
        : `⚠️ Você tem ${dias} dias para abrir seu MEI e continuar usando o AcheiObra.`
  }
}

// ── TABS ─────────────────────────────────────────────────────
window.trocarTab = function(tab) {
  document.getElementById('tab-btn-disponiveis').classList.toggle('active', tab === 'disponiveis')
  document.getElementById('tab-btn-meus').classList.toggle('active', tab === 'meus')
  document.getElementById('tab-disponiveis').style.display = tab === 'disponiveis' ? 'block' : 'none'
  document.getElementById('tab-meus').style.display        = tab === 'meus'        ? 'block' : 'none'
  if (tab === 'meus') carregarMeusServicos()
}

// ── CARREGAR SERVIÇOS DISPONÍVEIS ─────────────────────────────
async function carregarDisponiveis() {
  const [{ data: servicos, error }, { data: minhasPropostas }, { data: meusServicos }, { data: pgtos }] = await Promise.all([
    supabase.from('servicos')
      .select('id, tipo, status, urgencia, criado_em, detalhes, fotos_urls, cidade, clientes(nome), propostas(id, profissional_id, status)')
      .eq('status', 'aberto')
      .order('criado_em', { ascending: false }),
    supabase.from('propostas').select('id, status').eq('profissional_id', profissionalId),
    supabase.from('servicos').select('id, status').eq('profissional_id', profissionalId),
    supabase.from('pagamentos').select('valor_profissional').eq('profissional_id', profissionalId).eq('status', 'liberado'),
  ])

  if (error) {
    document.getElementById('tab-disponiveis').innerHTML =
      `<div class="vazio"><div class="vazio-ico">⚠️</div><div class="vazio-titulo">Erro ao carregar</div><div class="vazio-sub">${error.message}</div></div>`
    return
  }

  // Atualiza stats
  document.getElementById('stat-propostas').textContent = minhasPropostas?.length || 0
  document.getElementById('stat-andamento').textContent = meusServicos?.filter(s => s.status === 'em_andamento').length || 0
  const total = pgtos?.reduce((acc, p) => acc + Number(p.valor_profissional), 0) || 0
  document.getElementById('stat-ganhos').textContent = 'R$ ' + total.toLocaleString('pt-BR', {minimumFractionDigits:2})

  if (!servicos || servicos.length === 0) {
    document.getElementById('tab-disponiveis').innerHTML =
      '<div class="vazio"><div class="vazio-ico">🔍</div><div class="vazio-titulo">Nenhum serviço disponível</div><div class="vazio-sub">Novos serviços aparecerão aqui quando clientes postarem.</div></div>'
    return
  }

  document.getElementById('tab-disponiveis').innerHTML = servicos.map(s => renderServico(s)).join('')
}

function renderServico(s) {
  const data      = new Date(s.criado_em).toLocaleDateString('pt-BR')
  const jaPropus  = s.propostas?.some(p => p.profissional_id === profissionalId)
  const urgCls    = 'urg-' + (s.urgencia || 'normal')
  const urgLabel  = URG_LABEL[s.urgencia] || 'Normal'

  const detalhesHTML = s.detalhes
    ? Object.entries(s.detalhes).filter(([k,v]) => v && !k.startsWith('obs')).slice(0,4)
        .map(([,v]) => `<span class="detalhe-pill">${Array.isArray(v) ? v.join(', ') : v}</span>`).join('')
    : ''

  const fotosHTML = s.fotos_urls?.length
    ? s.fotos_urls.slice(0,4).map(url => `<img class="foto-thumb" src="${url}" alt="foto">`).join('')
    : '<div class="foto-placeholder">📷</div>'

  const id = s.id

  return `
    <div class="srv-card" id="srv-${id}">
      <div class="srv-top">
        <div class="srv-tipo">
          <div class="srv-emoji">${TIPO_EMOJI[s.tipo] || '🏗️'}</div>
          <div>
            <div class="srv-titulo">${TIPO_LABEL[s.tipo] || s.tipo}</div>
            <div class="srv-meta">${s.cidade} · ${data} · ${s.clientes?.nome || 'Cliente'}</div>
          </div>
        </div>
        <span class="urg-badge ${urgCls}">${urgLabel}</span>
      </div>
      ${detalhesHTML ? `<div class="detalhes-wrap">${detalhesHTML}</div>` : ''}
      <div class="fotos-wrap">${fotosHTML}</div>
      <div class="acoes-wrap">
        ${jaPropus
          ? `<div class="ja-proposta">✓ Proposta enviada</div>`
          : `<button class="btn-proposta" onclick="abrirProposta('${id}')">Fazer proposta</button>`
        }
        <button class="btn-chat-toggle" onclick="toggleChat('${id}')">💬 Mensagens</button>
      </div>
      <div class="form-proposta" id="form-${id}">
        <div class="form-titulo">Sua proposta</div>
        <div class="campo-row">
          <div class="campo-p">
            <label>Valor (R$) *</label>
            <input type="number" id="val-${id}" placeholder="Ex: 450,00" step="0.01" min="0">
          </div>
          <div class="campo-p">
            <label>Duração (dias) *</label>
            <input type="number" id="prazo-${id}" placeholder="Ex: 2" step="1" min="1">
          </div>
        </div>
        <div class="campo-p">
          <label>Data de início *</label>
          <input type="date" id="inicio-${id}">
        </div>
        <div class="campo-p">
          <label>Mensagem (opcional)</label>
          <textarea id="msg-${id}" placeholder="Experiência, disponibilidade, materiais inclusos..."></textarea>
        </div>
        <div class="form-btns">
          <button class="btn-cancelar-form" onclick="fecharProposta('${id}')">Cancelar</button>
          <button class="btn-enviar" onclick="enviarProposta('${id}')">Enviar proposta</button>
        </div>
      </div>
      <div class="chat-box" id="chat-${id}">
        <div class="chat-label">Mensagens</div>
        <div class="chat-msgs" id="msgs-${id}"></div>
        <div class="chat-input-row">
          <textarea class="chat-input" id="chat-input-${id}" placeholder="Escreva uma mensagem..." rows="1"></textarea>
          <button class="btn-send" onclick="enviarMsg('${id}')">➤</button>
        </div>
      </div>
    </div>`
}

// ── PROPOSTA ──────────────────────────────────────────────────
window.abrirProposta = function(id) {
  document.getElementById('form-' + id).classList.add('open')
}
window.fecharProposta = function(id) {
  document.getElementById('form-' + id).classList.remove('open')
}

window.enviarProposta = async function(id) {
  const valor  = parseFloat(document.getElementById('val-' + id).value)
  const prazo  = parseInt(document.getElementById('prazo-' + id).value)
  const inicio = document.getElementById('inicio-' + id).value
  const msg    = document.getElementById('msg-' + id).value.trim()

  if (!valor || valor <= 0) { toast('Informe um valor válido', 'erro'); return }
  if (!prazo || prazo <= 0) { toast('Informe a duração em dias', 'erro'); return }
  if (!inicio)              { toast('Informe a data de início', 'erro'); return }

  const { error } = await supabase.from('propostas').insert([{
    servico_id:      id,
    profissional_id: profissionalId,
    valor,
    prazo_dias:      prazo,
    data_inicio:     inicio,
    mensagem:        msg || null,
    status:          'enviada',
  }])

  if (error) {
    toast(error.message?.includes('unique') ? 'Você já enviou uma proposta.' : 'Erro ao enviar.', 'erro')
    return
  }

  toast('Proposta enviada! O cliente foi notificado.', 'ok')
  carregarDisponiveis()
}

// ── CHAT ─────────────────────────────────────────────────────
window.toggleChat = async function(id) {
  const box = document.getElementById('chat-' + id)
  const open = box.classList.toggle('open')
  if (open) await carregarMsgs(id)
}

async function carregarMsgs(id) {
  const { data: msgs } = await supabase
    .from('mensagens')
    .select('*')
    .eq('servico_id', id)
    .order('criado_em', { ascending: true })

  const container = document.getElementById('msgs-' + id)
  if (!msgs?.length) { container.innerHTML = '<div style="font-size:12px;color:var(--muted);text-align:center;padding:8px;">Nenhuma mensagem ainda.</div>'; return }

  container.innerHTML = msgs.map(m => {
    const hora = new Date(m.criado_em).toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'})
    const cls  = m.tipo_remetente === 'profissional' ? 'msg-pro' : 'msg-cli'
    return `<div class="msg ${cls}"><div class="msg-nome">${m.remetente_nome}</div>${m.mensagem}<div class="msg-hora">${hora}</div></div>`
  }).join('')
  container.scrollTop = container.scrollHeight
}

window.enviarMsg = async function(id) {
  const input = document.getElementById('chat-input-' + id)
  const texto = input.value.trim()
  if (!texto) return

  await supabase.from('mensagens').insert([{
    servico_id:     id,
    remetente_id:   user.id,
    tipo_remetente: 'profissional',
    remetente_nome: prof.nome || 'Profissional',
    mensagem:       texto,
  }])

  input.value = ''
  await carregarMsgs(id)
}

// ── MEUS SERVIÇOS ─────────────────────────────────────────────
async function carregarMeusServicos() {
  const { data: servicos } = await supabase
    .from('servicos')
    .select('id, tipo, status, valor_combinado, prazo_combinado, iniciado_em, concluido_em, clientes(nome), pagamentos(valor_profissional, status, liberado_em), avaliacoes(nota, comentario)')
    .eq('profissional_id', profissionalId)
    .in('status', ['em_andamento', 'concluido'])
    .order('iniciado_em', { ascending: false })

  if (!servicos?.length) {
    document.getElementById('tab-meus').innerHTML =
      '<div class="vazio"><div class="vazio-ico">📋</div><div class="vazio-titulo">Nenhum serviço ainda</div><div class="vazio-sub">Quando um cliente aceitar sua proposta, o serviço aparecerá aqui.</div></div>'
    return
  }

  const emAndamento = servicos.filter(s => s.status === 'em_andamento')
  const concluidos  = servicos.filter(s => s.status === 'concluido')
  const totalRecebido = concluidos.reduce((acc, s) => acc + Number(s.pagamentos?.[0]?.valor_profissional || 0), 0)

  let html = ''

  if (emAndamento.length) {
    html += '<div class="secao-label">Em andamento</div>'
    html += emAndamento.map(s => {
      const valorLiq = s.valor_combinado
        ? 'R$ ' + (s.valor_combinado * 0.85).toLocaleString('pt-BR', {minimumFractionDigits:2})
        : '—'
      return `
        <div class="meu-srv">
          <div class="meu-srv-top">
            <div>
              <div class="meu-srv-titulo">${TIPO_LABEL[s.tipo] || s.tipo}</div>
              <div class="meu-srv-meta">Cliente: ${s.clientes?.nome || '—'} · Iniciado: ${s.iniciado_em ? new Date(s.iniciado_em).toLocaleDateString('pt-BR') : '—'}</div>
            </div>
            <span class="badge-and">Em andamento</span>
          </div>
          <div class="valor-liq">${valorLiq}</div>
          <div class="valor-sub">Valor líquido após comissão (15%)</div>
          <button class="btn-concluir" onclick="marcarConcluido('${s.id}')">Marcar como concluído</button>
        </div>`
    }).join('')
  }

  if (concluidos.length) {
    html += '<div class="secao-label" style="margin-top:20px;">Histórico</div>'
    html += `
      <div class="total-recebido">
        <div><div class="total-label">Total recebido</div><div class="total-val">R$ ${totalRecebido.toLocaleString('pt-BR', {minimumFractionDigits:2})}</div></div>
        <div style="font-size:13px;color:#5DCAA5;opacity:0.7;">${concluidos.length} serviço(s)</div>
      </div>`

    html += concluidos.map(s => {
      const valorLiq = s.pagamentos?.[0]?.valor_profissional
        ? 'R$ ' + Number(s.pagamentos[0].valor_profissional).toLocaleString('pt-BR', {minimumFractionDigits:2})
        : '—'
      const pgtoTag = s.pagamentos?.[0]?.status === 'liberado'
        ? '<span class="pgto-tag pgto-liberado">Recebido ✓</span>'
        : '<span class="pgto-tag pgto-retido">Aguardando liberação</span>'
      const nota = s.avaliacoes?.[0]?.nota
      const comentario = s.avaliacoes?.[0]?.comentario

      return `
        <div class="meu-srv">
          <div class="meu-srv-top">
            <div>
              <div class="meu-srv-titulo">${TIPO_LABEL[s.tipo] || s.tipo}</div>
              <div class="meu-srv-meta">Cliente: ${s.clientes?.nome || '—'} · Concluído: ${s.concluido_em ? new Date(s.concluido_em).toLocaleDateString('pt-BR') : '—'}</div>
            </div>
            <span class="badge-conc">Concluído</span>
          </div>
          <div class="valor-liq">${valorLiq}</div>
          <div class="valor-sub">Valor líquido recebido</div>
          ${pgtoTag}
          ${nota ? `<div class="nota-aval">${'★'.repeat(nota)}${'☆'.repeat(5-nota)} ${nota}/5</div>` : ''}
          ${comentario ? `<div class="comentario-aval">"${comentario}"</div>` : ''}
        </div>`
    }).join('')
  }

  document.getElementById('tab-meus').innerHTML = html
}

window.marcarConcluido = async function(id) {
  if (!confirm('Confirma que o serviço foi concluído? O cliente receberá uma notificação para aprovar.')) return
  await supabase.from('servicos').update({ status: 'em_andamento' }).eq('id', id)
  toast('Cliente notificado para aprovar o serviço.', 'ok')
  carregarMeusServicos()
}

// ── SAIR ──────────────────────────────────────────────────────
window.sair = async function() {
  await supabase.auth.signOut()
  window.location.href = '/login'
}

// ── TOAST ─────────────────────────────────────────────────────
function toast(msg, tipo = 'ok') {
  const el = document.createElement('div')
  el.textContent = msg
  Object.assign(el.style, {
    position:'fixed', bottom:'24px', left:'50%', transform:'translateX(-50%)',
    background: tipo === 'ok' ? '#1D9E75' : '#E8521A',
    color:'#fff', padding:'12px 24px', borderRadius:'8px',
    fontSize:'14px', fontWeight:'500', zIndex:'9999',
  })
  document.body.appendChild(el)
  setTimeout(() => el.remove(), 3000)
}

// ── INIT ──────────────────────────────────────────────────────
carregarDisponiveis()
</script>
</body>
</html>
